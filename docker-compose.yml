version: '3.8'

services:
  bty-cutout:
    build: .
    container_name: bty-cutout
    ports:
      - "8090:8090"
    volumes:
      # 持久化存储
      - ./storage:/app/storage
      # 模型缓存（避免每次重启重新下载）
      - model_cache:/root/.u2net
    environment:
      # 时区设置
      - TZ=Asia/Shanghai
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  model_cache:
